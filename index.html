<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>아시아 출판 실천: 새로운 보편성을 향하여</title>
  <style>
    @font-face {
      font-family: "JH Web Duo";
      src: url("./assets/fonts/JHWebDuo-Regular.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "JH Web Duo";
      src: url("./assets/fonts/JHWebDuo-Bold.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      --paper: white;
      --ink: black;
      --text-size: 1rem;
      --meta-size: 0.8125rem;
      --line-height: 2;
      --paragraph-width: 40rem;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "JH Web Duo", ui-serif, serif;
      letter-spacing: 0;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: var(--paper);
    }

    header {
      max-width: var(--paragraph-width);
      padding: 1rem 1rem 0;
    }

    .eyebrow {
      margin: 0 0 0.375rem;
      color: var(--ink);
      font-size: var(--meta-size);
      font-weight: 400;
      line-height: var(--line-height);
    }

    article {
      max-width: var(--paragraph-width);
      padding: 5rem 1rem 4rem;
    }

    h1 {
      margin: 0 0 0.375rem;
      font-size: var(--text-size);
      line-height: var(--line-height);
      font-weight: 700;
      word-break: keep-all;
    }

    .author {
      margin: 0;
      color: var(--ink);
      font-size: var(--meta-size);
      line-height: var(--line-height);
    }

    h2 {
      margin: 2.25rem 0 0.75rem;
      color: var(--ink);
      font-size: var(--text-size);
      line-height: var(--line-height);
      font-weight: 700;
      word-break: keep-all;
    }

    p {
      margin: 0 0 2em;
      font-size: var(--text-size);
      line-height: var(--line-height);
      font-weight: 400;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    blockquote {
      margin: 0 0 2em;
      padding: 0;
      color: var(--ink);
    }

    blockquote p {
      margin: 0;
      font-size: var(--text-size);
      line-height: var(--line-height);
      font-weight: 700;
    }

    .header-main,
    .header-meta {
      min-width: 0;
    }

    @media (min-width: 40rem) {
      header {
        padding: 1rem 0 0 1rem;
      }

      article {
        padding: 10rem 0 4rem 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="header-main">
        <h1>아시아 출판 실천: 새로운 보편성을 향하여</h1>
      </div>
      <div class="header-meta">
        <p class="author">임경용</p>
      </div>
    </header>
    <article id="content"></article>
  </div>

  <script>
    const content = document.querySelector("#content");

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function render(markdown) {
      const blocks = markdown
        .replace(/^# .+\n+\S+\n+/, "")
        .trim()
        .split(/\n{2,}/);

      content.innerHTML = blocks.map((block) => {
        if (block.startsWith("## ")) {
          return `<h2>${escapeHtml(block.slice(3))}</h2>`;
        }

        if (block.startsWith("> ")) {
          return `<blockquote><p>${escapeHtml(block.replace(/^> /gm, ""))}</p></blockquote>`;
        }

        return `<p>${escapeHtml(block).replace(/\n/g, " ")}</p>`;
      }).join("");
    }

    fetch("./article.md")
      .then((response) => response.text())
      .then(render)
      .catch(() => {
        content.innerHTML = "<p>article.md를 불러오지 못했습니다.</p>";
      });
  </script>
</body>
</html>
